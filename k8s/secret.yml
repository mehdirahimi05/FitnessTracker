apiVersion: v1        # Kubernetes API Version
kind: Secret          # Typ der Ressource → geheime Daten
metadata:
  name: fitness-tracker-secret  # Name des Secrets
type: Opaque          # allgemeiner Secret Typ
data:
  # Passwörter müssen base64 verschlüsselt sein
  # "password" in base64 → cGFzc3dvcmQ=
  # Befehl: echo -n "password" | base64
  SPRING_DATASOURCE_PASSWORD: cGFzc3dvcmQ=

  # JWT Secret in base64
  # "fitness-tracker-secret-key-minimum-256-bit-long-string" in base64
  JWT_SECRET: Zml0bmVzcy10cmFja2VyLXNlY3JldC1rZXktbWluaW11bS0yNTYtYml0LWxvbmctc3RyaW5n