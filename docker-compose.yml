services:

  # PostgreSQL database Container
  db:
    image: postgres:16-alpine
    container_name: fitness-tracker-db
    environment:
      POSTGRES_DB: fitness_tracker
      POSTGRES_USER: mehdirahimi
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # FitnessTracker App Container
  app:
    build: .
    container_name: fitness-tracker-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fitness_tracker
      SPRING_DATASOURCE_USERNAME: mehdirahimi
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: fitness-tracker-secret-key-minimum-256-bit-long-string
      JWT_EXPIRATION: 86400000
    depends_on:
      - db

volumes:
  postgres_data: