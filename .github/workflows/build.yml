name: Build and Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      # Step 1: Code aus dem Repository holen
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Java 19 installieren auf der frischen VM
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Maven Dependencies cachen (spart Zeit beim naechsten Run)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # Step 4: Projekt bauen ohne Tests
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Step 5: Tests ausfuehren
      - name: Run tests
        run: mvn test
        continue-on-error: true

      # Step 6: JaCoCo Coverage Report hochladen
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: |
            storage/target/site/jacoco/
            api/target/site/jacoco/
          retention-days: 7

      # Step 7: JAR als Artefakt hochladen
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-tracker-jar
          path: |
            storage/target/*.jar
            api/target/*.jar
          retention-days: 7